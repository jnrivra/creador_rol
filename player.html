<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡A la Carrera! - Vista de Jugadores</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐆</text></svg>">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/dice.css">
    <style>
        /* === Player View - Self-contained styles === */
        :root {
            --gold: #f4a261;
            --gold-light: #e9c46a;
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 20px; }

        body {
            font-family: var(--font);
            background: #0a0a1a;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font-family: var(--font);
            cursor: pointer;
            border: none;
            outline: none;
            transition: transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        /* === Scene Backgrounds === */
        .scene-background {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            transition: opacity 0.8s ease;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* When a real image is loaded */
        .scene-background.has-image {
            background-color: #0a0a1a;
        }
        .scene-background.has-image::before,
        .scene-background.has-image::after {
            display: none !important;
        }

        /* Cinematic vignette overlay (higher specificity to override has-image hiding) */
        .scene-background.has-image.has-cinematic::after {
            content: '' !important;
            display: block !important;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Color grading per scene */
        .scene-background.has-image.bg-forest-clearing { filter: saturate(1.15) brightness(1.05); }
        .scene-background.has-image.bg-river { filter: saturate(1.1) brightness(0.95) hue-rotate(-5deg); }
        .scene-background.has-image.bg-tunnel { filter: saturate(0.9) brightness(0.7); }
        .scene-background.has-image.bg-den { filter: saturate(1.2) brightness(0.85) sepia(0.1); }
        .scene-background.has-image.bg-treasure { filter: saturate(1.2) brightness(1.1); }
        .scene-background.has-image.bg-victory { filter: saturate(1.3) brightness(1.05) hue-rotate(5deg); }

        /* Scene transition overlay — fade through black */
        #scene-transition-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a1a;
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        #scene-transition-overlay.active {
            opacity: 1;
        }

        .bg-forest-clearing {
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 30%, #4a7c3f 30%, #2d5a27 60%, #1a4a14 100%);
        }
        .bg-forest-clearing::before {
            content: '🌿🌳🌿🌲🌿🌳🌿';
            position: absolute; bottom: 30%; left: 0; right: 0;
            text-align: center; font-size: 4rem; letter-spacing: 1rem;
            opacity: 0.4; animation: sway 4s ease-in-out infinite;
        }
        .bg-forest-clearing::after {
            content: '';
            position: absolute; top: 10%; right: 15%;
            width: 80px; height: 80px;
            background: radial-gradient(circle, #FFD700 30%, #FFA500 60%, transparent 70%);
            border-radius: 50%; animation: glow 3s infinite alternate;
        }

        .bg-river {
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 25%, #4a7c3f 25%, #2d5a27 45%, #2196F3 45%, #1565C0 65%, #2d5a27 65%, #1a4a14 100%);
        }
        .bg-river::before {
            content: '';
            position: absolute; top: 45%; left: 0; right: 0; height: 20%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 25%, transparent 50%, rgba(255,255,255,0.15) 75%, transparent 100%);
            animation: waveFlow 3s linear infinite;
        }

        .bg-tunnel {
            background: radial-gradient(ellipse at center, #1a2a1a 0%, #0d150d 40%, #050a05 100%);
        }

        .bg-den {
            background: radial-gradient(ellipse at center bottom, #8B4513 0%, #654321 40%, #3d2914 70%, #1a1208 100%);
        }
        .bg-den::before {
            content: '🦡';
            position: absolute; bottom: 25%; left: 50%;
            transform: translateX(-50%); font-size: 5rem;
            animation: grumble 2s ease-in-out infinite; opacity: 0.3;
        }

        .bg-treasure {
            background: radial-gradient(ellipse at center, #FFD700 0%, #DAA520 20%, #8B6914 40%, #2d5a27 60%, #1a4a14 100%);
            animation: treasureGlow 2s ease-in-out infinite alternate;
        }
        .bg-treasure::before {
            content: '✨💎✨';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 4rem;
            animation: sparkle 1.5s ease-in-out infinite; opacity: 0.3;
        }

        .bg-victory {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
        }
        .bg-victory::before {
            content: '⭐🌟⭐🌟⭐🌟⭐';
            position: absolute; top: 10%; left: 0; right: 0;
            text-align: center; font-size: 2.5rem; letter-spacing: 1rem;
            animation: twinkle 1s ease-in-out infinite alternate; opacity: 0.5;
        }

        @keyframes treasureGlow { to { filter: brightness(1.1); } }
        @keyframes grumble { 0%, 100% { transform: translateX(-50%) rotate(-2deg); } 50% { transform: translateX(-50%) rotate(2deg); } }
        @keyframes sparkle { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; } }
        @keyframes waveFlow { to { background-position-x: 200%; } }

        /* === Layout === */
        .player-wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === Status Bar === */
        .player-status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.5rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
            min-height: 50px;
        }

        .player-status-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .die-indicator {
            font-size: 1rem;
            font-weight: 800;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .clock-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        .clock-segment {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        .clock-segment.filled {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(244, 162, 97, 0.5);
        }

        #player-scene-counter {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
        }

        /* === Main Content === */
        #player-main {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 2rem;
            overflow-y: auto;
        }

        .scene-content-player {
            max-width: 950px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* === Scene Illustration === */
        .scene-illustration {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .scene-art {
            font-size: 2rem;
            line-height: 1.4;
            letter-spacing: 0.3rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        }

        .scene-illustration-forest .scene-art { border-color: rgba(74, 124, 63, 0.4); }
        .scene-illustration-river .scene-art { border-color: rgba(33, 150, 243, 0.4); }
        .scene-illustration-tunnel .scene-art { border-color: rgba(255, 235, 59, 0.2); background: rgba(0,0,0,0.6); }
        .scene-illustration-den .scene-art { border-color: rgba(139, 69, 19, 0.4); }
        .scene-illustration-treasure .scene-art { border-color: rgba(255, 215, 0, 0.4); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        .scene-illustration-victory .scene-art {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        /* === Scene Title === */
        .player-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        /* Cinematic title style when images are present */
        .has-cinematic-ui .player-title {
            font-family: 'Georgia', 'Palatino', 'Book Antiqua', serif;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 30px rgba(255,215,0,0.15);
            letter-spacing: 0.05em;
        }

        /* === Narrative === */
        .player-narrative {
            font-size: 1.5rem;
            line-height: 1.8;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem 2.5rem;
            border-radius: var(--radius);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            cursor: pointer;
            min-height: 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .player-narrative.typing::after {
            content: '▋';
            animation: blink 0.8s infinite;
        }

        /* Cinematic narrative style */
        .has-cinematic-ui .player-narrative {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.12);
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.45rem;
            line-height: 1.9;
            letter-spacing: 0.01em;
        }

        /* === Choices === */
        .player-choices {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            transition: opacity 0.4s ease;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.92);
            color: #264653;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 1.3rem 1.5rem;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            min-height: 80px;
            flex-wrap: wrap;
            cursor: default;
            animation: slideUp 0.4s ease-out;
        }

        .choice-emoji { font-size: 2.5rem; flex-shrink: 0; }
        .choice-text { flex: 1; }

        .choice-badge {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        .choice-badge.advantage { background: rgba(244, 162, 97, 0.2); color: #c2410c; }
        .choice-badge.auto-success { background: rgba(34, 197, 94, 0.2); color: #15803d; }
        .choice-badge.roll { background: rgba(99, 102, 241, 0.15); color: #4338ca; }

        /* Glassmorphism choices in cinematic mode */
        .has-cinematic-ui .choice-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .has-cinematic-ui .choice-badge.advantage { background: rgba(244, 162, 97, 0.3); color: #fbbf24; }
        .has-cinematic-ui .choice-badge.auto-success { background: rgba(34, 197, 94, 0.3); color: #4ade80; }
        .has-cinematic-ui .choice-badge.roll { background: rgba(99, 102, 241, 0.3); color: #a5b4fc; }

        /* === Outcome === */
        .player-outcome {
            display: none;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 1.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.08);
            animation: slideUp 0.3s ease-out;
        }

        .outcome-text {
            font-size: 1.4rem;
            line-height: 1.7;
            color: white;
            margin-bottom: 0.5rem;
        }

        .auto-success-banner {
            font-size: 1.6rem;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 0.8rem;
            animation: popIn 0.3s ease-out;
        }

        .skill-banner { color: #fbbf24; }

        .clock-warning {
            background: rgba(231, 111, 81, 0.3);
            color: #fca5a5;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            margin-top: 0.8rem;
            animation: shake 0.5s ease-out;
        }

        /* === Dice Area === */
        .dice-area { text-align: center; min-height: 40px; }
        .dice-area.active { padding: 1rem 0; }

        .die {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #fff 0%, #e8e8e8 100%);
            border-radius: 20px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
            position: relative;
            margin: 0 auto;
        }

        .die.rolling { animation: dieRoll 0.8s ease-in-out infinite; }
        .die .die-label { font-size: 0.8rem; color: #666; font-weight: 700; }
        .die .die-value { font-size: 3.5rem; font-weight: 900; color: #333; }
        .die.settled { animation: none; }
        .die.result-critico { background: linear-gradient(135deg, #fef3c7, #fde68a); box-shadow: 0 0 30px rgba(234,179,8,0.5); }
        .die.result-exito { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
        .die.result-complicacion { background: linear-gradient(135deg, #ffedd5, #fed7aa); }
        .die.result-juerga { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }

        .dice-result {
            font-size: 2rem;
            font-weight: 800;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            margin-top: 0.8rem;
            display: inline-block;
            animation: popIn 0.3s ease-out;
        }

        .dice-result.result-critico { color: #b45309; }
        .dice-result.result-exito { color: #15803d; }
        .dice-result.result-complicacion { color: #c2410c; }
        .dice-result.result-juerga { color: #7c3aed; }

        .result-emoji { font-size: 2.5rem; }
        .advantage-badge { font-size: 1rem; color: var(--gold); font-weight: 700; margin-top: 0.5rem; }
        .dice-detail { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 0.4rem; }

        /* === Victory === */
        .victory-content { text-align: center; }

        .victory-title {
            font-size: 3.5rem !important;
            animation: pulse 1.5s ease-in-out infinite !important;
            color: var(--gold-light) !important;
        }

        .victory-team {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 1.5rem 0;
        }

        .victory-character {
            text-align: center;
            animation: bounce 1s ease-in-out infinite;
        }

        .victory-character:nth-child(2) { animation-delay: 0.2s; }

        .victory-emoji { font-size: 6rem; display: block; margin-bottom: 0.3rem; }

        .victory-character span:last-child {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }

        .victory-level {
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 700;
            display: block;
        }

        .victory-message {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 1rem 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .victory-stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .victory-stats span {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }

        /* === Waiting Screen === */
        .waiting-screen {
            text-align: center;
            color: white;
            padding: 2rem;
            animation: fadeIn 1.5s ease-out;
        }

        .waiting-emoji {
            font-size: 7rem;
            animation: bounce 2s ease-in-out infinite;
            margin-bottom: 1.5rem;
            display: block;
            filter: drop-shadow(0 0 20px rgba(244, 162, 97, 0.4));
        }

        .waiting-text {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 2.4rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6), 0 0 40px rgba(244, 162, 97, 0.15);
            letter-spacing: 0.03em;
        }

        /* Game title on waiting screen */
        .waiting-title-block {
            margin-bottom: 1.5rem;
        }
        .waiting-game-title {
            font-family: 'Georgia', 'Palatino', 'Book Antiqua', serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 3px 12px rgba(0,0,0,0.8), 0 0 50px rgba(255,215,0,0.2);
            margin-bottom: 0.3rem;
            letter-spacing: 0.04em;
            animation: fadeIn 1s ease-out;
        }
        .waiting-game-sub {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.4rem;
            color: var(--gold-light, #e9c46a);
            font-style: italic;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        /* Character selection display (synced from GM) */
        .player-char-selection {
            min-height: 40px;
            margin: 1rem 0;
        }
        .pcs-label {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-align: center;
        }
        .pcs-remaining {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            text-align: center;
        }

        /* Full character cards during selection */
        .pcs-cards {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .pcs-card {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--card-color, #f4a261);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            width: 220px;
            text-align: center;
            animation: teamCardPop 0.5s ease-out both;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4), inset 0 0 30px rgba(0,0,0,0.1);
        }
        @keyframes teamCardPop {
            0% { opacity: 0; transform: translateY(40px) scale(0.8); }
            60% { transform: translateY(-5px) scale(1.03); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .pcs-card-portrait {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: block;
            margin: 0 auto 0.6rem;
        }
        .pcs-card-emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }
        .pcs-card-name {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }
        .pcs-card-species {
            font-size: 0.85rem;
            color: var(--card-color, rgba(255,255,255,0.6));
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .pcs-card-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            margin-bottom: 0.5rem;
        }
        .pcs-card-tags {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            text-align: left;
        }
        .pcs-tag {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.6);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .pcs-tag span { font-size: 0.8rem; }
        .pcs-tag-skill { color: #fbbf24; }
        .pcs-tag-tool { color: #86efac; }
        .pcs-tag-talent { color: #93c5fd; }
        .pcs-tag-trait { color: #d8b4fe; }

        /* ====== TEAM CONFIRMED FULL SCREEN ====== */
        .team-confirmed-screen {
            width: 100%;
            max-width: 1100px;
            padding: 1rem;
            animation: fadeIn 0.5s ease-out;
        }
        .tc-title {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: white;
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6), 0 0 30px rgba(255,215,0,0.15);
            letter-spacing: 0.03em;
        }
        .tc-cards {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .tc-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid var(--card-color, #f4a261);
            border-radius: 18px;
            padding: 1.2rem;
            width: 280px;
            animation: teamCardPop 0.6s ease-out both;
            box-shadow: 0 8px 35px rgba(0,0,0,0.5),
                        inset 0 1px 0 rgba(255,255,255,0.08),
                        0 0 20px rgba(255,255,255,0.06);
        }
        .tc-card-top {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .tc-portrait {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .tc-emoji {
            font-size: 4rem;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }
        .tc-card-header { flex: 1; }
        .tc-name {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.4);
            line-height: 1.2;
        }
        .tc-species {
            font-size: 0.9rem;
            color: var(--card-color, rgba(255,255,255,0.7));
            font-weight: 700;
        }
        .tc-guild {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            margin-top: 0.1rem;
        }
        .tc-tags {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .tc-tag {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.75);
            line-height: 1.3;
        }
        .tc-tag strong {
            color: white;
        }
        .tc-tag small {
            color: rgba(255,255,255,0.45);
            font-size: 0.7rem;
        }
        .tc-tag-icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 0.05rem;
        }
        .tc-tag-skill { border-left: 3px solid #fbbf24; padding-left: 0.5rem; }
        .tc-tag-tool { border-left: 3px solid #86efac; padding-left: 0.5rem; }
        .tc-tag-talent { border-left: 3px solid #93c5fd; padding-left: 0.5rem; }
        .tc-tag-trait { border-left: 3px solid #d8b4fe; padding-left: 0.5rem; }
        .tc-waiting {
            text-align: center;
            margin-top: 1.5rem;
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.4);
            font-style: italic;
        }
        .tc-waiting::after {
            content: '';
            animation: waitingDots 1.5s infinite;
        }

        /* Responsive: smaller screens */
        @media (max-width: 900px) {
            .tc-cards { gap: 1rem; }
            .tc-card { width: 240px; padding: 1rem; }
            .tc-name { font-size: 1.2rem; }
            .tc-portrait { width: 60px; height: 60px; }
            .pcs-cards { gap: 1rem; }
            .pcs-card { width: 180px; padding: 0.8rem; }
        }
        @media (max-width: 600px) {
            .tc-cards { flex-direction: column; align-items: center; }
            .tc-card { width: 90%; max-width: 320px; }
            .tc-title { font-size: 1.6rem; }
            .pcs-cards { flex-direction: column; align-items: center; }
            .pcs-card { width: 90%; max-width: 260px; }
            .loot-cards { flex-direction: column; align-items: center; }
            .loot-card { width: 80%; max-width: 240px; }
            .levelup-emoji { font-size: 5rem; }
            .levelup-title { font-size: 2.5rem; }
        }

        .waiting-sub {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 2rem;
            font-style: italic;
        }

        .btn-activate-audio {
            background: linear-gradient(135deg, var(--gold) 0%, #e76f51 100%);
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(231, 111, 81, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        .btn-activate-audio:hover {
            transform: scale(1.05);
        }

        /* === Confetti === */
        #confetti-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -10px;
            width: 12px;
            height: 12px;
            animation: confettiFall 3s ease-in forwards;
        }

        .confetti-circle { border-radius: 50%; }
        .confetti-strip { width: 5px; height: 16px; border-radius: 2px; }

        /* === Background Extras === */
        .bg-extra { position: absolute; pointer-events: none; z-index: 1; }
        .floating-leaf { animation: leafFall 8s linear infinite; }
        .bg-firefly {
            width: 6px; height: 6px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffeb3b, 0 0 15px #ffeb3b;
            animation: firefly 4s ease-in-out infinite;
        }
        .bg-sparkle { animation: sparkleFloat 2s ease-in-out infinite; }
        .bg-splash { animation: splashUp 3s ease-in-out infinite; }
        .bg-star { animation: starTwinkle 2s ease-in-out infinite; }

        /* === Team Panel (sidebar) === */
        .player-team-panel {
            position: fixed;
            right: 0;
            top: 60px;
            bottom: 0;
            width: 260px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 50;
            padding: 1rem;
            overflow-y: auto;
            animation: slideInRight 0.4s ease-out;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .player-team-header {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .player-team-member {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 0.7rem;
            margin-bottom: 0.7rem;
            border-left: 4px solid;
            display: flex;
            gap: 0.7rem;
            align-items: flex-start;
        }

        .ptm-avatar {
            font-size: 2.8rem;
            line-height: 1;
            flex-shrink: 0;
        }

        /* Character portrait in team panel (when image available) */
        .ptm-portrait {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        /* Character portrait in victory (when image available) */
        .victory-portrait {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--gold);
            box-shadow: 0 0 20px rgba(244,162,97,0.4);
            display: block;
            margin: 0 auto 0.3rem;
        }

        .ptm-info { flex: 1; }

        .ptm-name {
            font-size: 1rem;
            font-weight: 800;
            color: white;
        }

        .ptm-species {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.3rem;
        }

        .ptm-level {
            color: var(--gold);
            font-weight: 700;
        }

        .ptm-tags {
            display: flex;
            flex-direction: column;
            gap: 0.12rem;
        }

        .ptm-tag {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.55);
        }

        /* === Roll Prompt === */
        .roll-prompt {
            text-align: center;
            padding: 1.5rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .roll-prompt-emoji {
            font-size: 5rem;
            animation: bounce 1s ease-in-out infinite;
            display: block;
            margin-bottom: 0.5rem;
        }

        .roll-prompt-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }

        .roll-prompt-detail {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
        }

        .roll-prompt-advantage {
            font-size: 1rem;
            color: #fbbf24;
            font-weight: 700;
            margin-top: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Player dice input on roll prompt */
        .roll-prompt-input-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1.2rem;
            animation: slideUp 0.4s ease-out 0.3s both;
        }

        .roll-prompt-die-label {
            font-size: 1.3rem;
            font-weight: 900;
            color: rgba(255,255,255,0.6);
        }

        .player-roll-input {
            width: 90px;
            padding: 0.8rem 0.5rem;
            font-size: 1.8rem;
            font-weight: 900;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: var(--radius-sm);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            outline: none;
            -moz-appearance: textfield;
        }

        .player-roll-input::-webkit-outer-spin-button,
        .player-roll-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .player-roll-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(244, 162, 97, 0.4);
        }

        .btn-player-roll {
            padding: 0.8rem 1.8rem;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #264653;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            min-height: 55px;
        }

        .btn-player-roll:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(244, 162, 97, 0.4);
        }

        .btn-player-roll:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
        }

        /* Player continue button after outcome */
        .btn-player-continue {
            display: block;
            width: 100%;
            margin-top: 1.2rem;
            padding: 1.2rem 2rem;
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #264653;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            animation: slideUp 0.4s ease-out 0.5s both;
            min-height: 60px;
        }

        .btn-player-continue:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(244, 162, 97, 0.4);
        }

        .btn-player-continue:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
        }

        /* Interactive choice styles */
        .choice-btn-interactive {
            cursor: pointer !important;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }

        .has-cinematic-ui .choice-btn-interactive:hover {
            transform: translateX(8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.4);
        }

        .choice-btn-interactive:active {
            transform: scale(0.97) !important;
        }

        .choice-btn.choice-selected {
            background: rgba(74, 222, 128, 0.2) !important;
            border: 2px solid rgba(74, 222, 128, 0.6) !important;
            opacity: 1 !important;
            pointer-events: none !important;
        }

        /* === Waiting for GM === */
        .player-waiting-gm {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
        }

        .waiting-dots::after {
            content: '';
            animation: waitingDots 1.5s infinite;
        }

        @keyframes waitingDots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* === Scene transition === */
        .scene-transitioning {
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        /* === Cinematic Enhancements === */

        /* Subtle breathing animation on background when cinematic.
           Start slightly overscaled so edges stay hidden during the breathe cycle. */
        .scene-background.has-image {
            animation: sceneBreathe 8s ease-in-out infinite;
            transform-origin: center center;
            /* Extend beyond viewport to hide edges during scale oscillation */
            top: -2%; left: -2%; right: -2%; bottom: -2%;
        }
        @keyframes sceneBreathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* Cinematic status bar */
        .has-cinematic-ui .player-status-bar {
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 80%, transparent 100%);
            border-bottom: none;
            padding-bottom: 1.2rem;
        }

        /* Portrait hover effect in team panel */
        .ptm-portrait {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .ptm-portrait:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
        }

        /* Victory portrait animation */
        .victory-portrait {
            animation: portraitGlow 2s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        .victory-portrait:hover {
            transform: scale(1.1);
        }

        /* Cinematic outcome panel */
        .has-cinematic-ui .player-outcome {
            background: rgba(0, 0, 0, 0.65);
            border: 1px solid rgba(255,255,255,0.12);
        }

        /* Smooth transition for background image changes */
        .scene-background.has-image {
            transition: background-image 0s, opacity 0.6s ease;
        }

        /* ====== CHAPTER CARD ====== */
        .chapter-card-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            padding: 2rem;
            animation: fadeIn 0.6s ease-out;
        }

        .chapter-number {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--gold-light);
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: chapterFadeUp 0.6s ease-out 0.2s forwards;
        }

        .chapter-divider {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0.8rem 0 1.2rem;
            opacity: 0;
            transform: scaleX(0);
            animation: chapterDividerExpand 0.5s ease-out 0.4s forwards;
        }

        .chapter-emoji {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
            animation: chapterEmojiPop 0.6s ease-out 0.6s forwards;
        }

        .chapter-title {
            font-family: 'Georgia', 'Palatino', 'Book Antiqua', serif;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            text-align: center;
            text-shadow: 0 3px 20px rgba(0,0,0,0.8), 0 0 60px rgba(255,215,0,0.15);
            max-width: 85%;
            line-height: 1.2;
            opacity: 0;
            animation: chapterFadeUp 0.8s ease-out 0.9s forwards;
        }

        @keyframes chapterFadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes chapterDividerExpand {
            from { opacity: 0; transform: scaleX(0); }
            to { opacity: 1; transform: scaleX(1); }
        }

        @keyframes chapterEmojiPop {
            0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            60% { transform: scale(1.15) rotate(3deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        /* ====== OUTCOME RESULT COLORS ====== */
        .player-outcome.result-critico {
            border-left: 4px solid #fde047;
            box-shadow: 0 0 25px rgba(234,179,8,0.15), inset 0 0 30px rgba(234,179,8,0.03);
        }
        .player-outcome.result-exito {
            border-left: 4px solid #86efac;
            box-shadow: 0 0 25px rgba(34,197,94,0.15), inset 0 0 30px rgba(34,197,94,0.03);
        }
        .player-outcome.result-complicacion {
            border-left: 4px solid #fdba74;
            box-shadow: 0 0 25px rgba(249,115,22,0.15), inset 0 0 30px rgba(249,115,22,0.03);
        }
        .player-outcome.result-juerga {
            border-left: 4px solid #d8b4fe;
            box-shadow: 0 0 25px rgba(168,85,247,0.15), inset 0 0 30px rgba(168,85,247,0.03);
        }

        /* Outcome type badge */
        .outcome-type-badge {
            font-size: 1.6rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 0.8rem;
            animation: popIn 0.4s ease-out;
        }
        .result-badge-critico { color: #fde047; text-shadow: 0 0 20px rgba(234,179,8,0.4); }
        .result-badge-exito { color: #86efac; text-shadow: 0 0 20px rgba(34,197,94,0.4); }
        .result-badge-complicacion { color: #fdba74; text-shadow: 0 0 20px rgba(249,115,22,0.4); }
        .result-badge-juerga { color: #d8b4fe; text-shadow: 0 0 20px rgba(168,85,247,0.4); }

        /* ====== SCREEN SHAKE ====== */
        @keyframes screenShake {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-4px, -3px); }
            20% { transform: translate(4px, 2px); }
            30% { transform: translate(-3px, 4px); }
            40% { transform: translate(3px, -2px); }
            50% { transform: translate(-2px, 1px); }
            60% { transform: translate(2px, -1px); }
        }
        .screen-shake { animation: screenShake 0.5s ease-out; }

        /* ====== CHOICE BUTTON ENHANCEMENTS ====== */
        .has-cinematic-ui .choice-btn {
            transition: all 0.25s ease;
        }
        .has-cinematic-ui .choice-btn:nth-child(1) { animation-delay: 0s; }
        .has-cinematic-ui .choice-btn:nth-child(2) { animation-delay: 0.15s; }
        .has-cinematic-ui .choice-btn:nth-child(3) { animation-delay: 0.3s; }

        /* Pulse glow on auto-success choices */
        .choice-btn .choice-badge.auto-success {
            animation: autoSuccessPulse 2s ease-in-out infinite;
        }
        @keyframes autoSuccessPulse {
            0%, 100% { box-shadow: 0 0 0 rgba(34,197,94,0); }
            50% { box-shadow: 0 0 12px rgba(34,197,94,0.4); }
        }

        /* ====== VICTORY SPECTACULAR ====== */
        .victory-rays {
            position: fixed;
            top: 50%; left: 50%;
            width: 200vmax; height: 200vmax;
            transform: translate(-50%, -50%);
            background: conic-gradient(
                from 0deg,
                transparent 0deg, rgba(255,215,0,0.04) 10deg, transparent 20deg,
                transparent 20deg, rgba(255,215,0,0.04) 30deg, transparent 40deg,
                transparent 40deg, rgba(255,215,0,0.04) 50deg, transparent 60deg,
                transparent 60deg, rgba(255,215,0,0.04) 70deg, transparent 80deg,
                transparent 80deg, rgba(255,215,0,0.04) 90deg, transparent 100deg,
                transparent 100deg, rgba(255,215,0,0.04) 110deg, transparent 120deg,
                transparent 120deg, rgba(255,215,0,0.04) 130deg, transparent 140deg,
                transparent 140deg, rgba(255,215,0,0.04) 150deg, transparent 160deg,
                transparent 160deg, rgba(255,215,0,0.04) 170deg, transparent 180deg,
                transparent 180deg, rgba(255,215,0,0.04) 190deg, transparent 200deg,
                transparent 200deg, rgba(255,215,0,0.04) 210deg, transparent 220deg,
                transparent 220deg, rgba(255,215,0,0.04) 230deg, transparent 240deg,
                transparent 240deg, rgba(255,215,0,0.04) 250deg, transparent 260deg,
                transparent 260deg, rgba(255,215,0,0.04) 270deg, transparent 280deg,
                transparent 280deg, rgba(255,215,0,0.04) 290deg, transparent 300deg,
                transparent 300deg, rgba(255,215,0,0.04) 310deg, transparent 320deg,
                transparent 320deg, rgba(255,215,0,0.04) 330deg, transparent 340deg,
                transparent 340deg, rgba(255,215,0,0.04) 350deg, transparent 360deg
            );
            animation: raysSpin 25s linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: raysFadeIn 2s ease-out forwards, raysSpin 25s linear 2s infinite;
        }
        @keyframes raysSpin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes raysFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .victory-crown {
            font-size: 6rem;
            text-align: center;
            opacity: 0;
            animation: victoryCrownDrop 0.8s ease-out 0.3s forwards;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.5));
        }
        @keyframes victoryCrownDrop {
            0% { opacity: 0; transform: translateY(-60px) scale(0.5) rotate(-15deg); }
            60% { transform: translateY(5px) scale(1.1) rotate(3deg); }
            100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
        }

        .victory-content .victory-title {
            font-family: 'Georgia', 'Palatino', serif;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700, #ff6b00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3.5rem !important;
            animation: victoryGradient 3s ease-in-out infinite, pulse 1.5s ease-in-out infinite !important;
        }
        @keyframes victoryGradient {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .victory-content .victory-character {
            opacity: 0;
            animation: victoryCharPop 0.6s ease-out forwards;
        }

        @keyframes victoryCharPop {
            0% { opacity: 0; transform: translateY(30px) scale(0.8); }
            60% { transform: translateY(-5px) scale(1.05); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .victory-stats span {
            opacity: 0;
            animation: popIn 0.4s ease-out forwards;
        }
        .victory-stats span:nth-child(1) { animation-delay: 1.2s; }
        .victory-stats span:nth-child(2) { animation-delay: 1.4s; }
        .victory-stats span:nth-child(3) { animation-delay: 1.6s; }

        .victory-fin {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.5em;
            color: var(--gold);
            text-align: center;
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 3s forwards;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }

        /* ====== ROLL PROMPT ENHANCEMENT ====== */
        .roll-prompt {
            animation: none;
        }
        .roll-prompt-emoji {
            filter: drop-shadow(0 0 20px rgba(244,162,97,0.5));
        }

        /* ====== NARRATIVE TYPING CURSOR ====== */
        .player-narrative.typing {
            border-right: none;
        }

        /* ====== SMOOTH CONTENT TRANSITIONS ====== */
        .scene-content-player {
            animation: fadeIn 0.5s ease-out;
        }

        /* ====== LEVEL UP CEREMONY ====== */
        .levelup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        .levelup-content {
            text-align: center;
            animation: popIn 0.5s ease-out;
            position: relative;
        }
        .levelup-emoji {
            font-size: 8rem;
            filter: drop-shadow(0 0 40px rgba(255,215,0,0.6));
            animation: bounce 1s ease-in-out infinite;
        }
        .levelup-title {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff8c00, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: victoryGradient 2s ease-in-out infinite;
            margin: 0.5rem 0;
        }
        .levelup-name {
            font-size: 2rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .levelup-rank {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 1.5rem;
            color: var(--gold-light);
            margin-top: 0.3rem;
            font-style: italic;
        }
        .levelup-unlock {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            margin-top: 0.8rem;
            padding: 0.5rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: inline-block;
        }

        /* ====== BADGE TOAST ====== */
        .badge-toast {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 150;
            animation: slideInRight 0.4s ease-out;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .badge-toast-exit {
            animation: slideOutRight 0.5s ease-in forwards;
        }
        @keyframes slideOutRight {
            to { transform: translateX(120%); opacity: 0; }
        }
        .badge-toast-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.4));
        }
        .badge-toast-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .badge-toast-title {
            font-size: 0.8rem;
            color: var(--gold);
            font-weight: 700;
        }
        .badge-toast-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
        }

        /* ====== LOOT REVEAL ====== */
        .loot-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }
        .loot-content {
            text-align: center;
        }
        .loot-title {
            font-family: 'Georgia', 'Palatino', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 2rem;
            animation: popIn 0.5s ease-out;
        }
        .loot-cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .loot-card {
            background: rgba(255,255,255,0.08);
            border: 2px solid;
            border-radius: 16px;
            padding: 1.5rem 2rem;
            width: 200px;
            text-align: center;
            opacity: 0;
            animation: lootCardReveal 0.6s ease-out forwards;
            position: relative;
            overflow: hidden;
        }
        @keyframes lootCardReveal {
            0% { opacity: 0; transform: scale(0.5) rotateY(180deg); }
            60% { transform: scale(1.1) rotateY(0deg); }
            100% { opacity: 1; transform: scale(1) rotateY(0deg); }
        }
        .loot-card-glow {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            opacity: 0.05;
            border-radius: 50%;
            filter: blur(30px);
        }
        .loot-card-emoji {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            position: relative;
        }
        .loot-card-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: white;
            position: relative;
        }
        .loot-card-rareza {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.2rem;
            position: relative;
        }
        .loot-card-desc {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            margin-top: 0.5rem;
            position: relative;
        }
    </style>
</head>
<body>

        <div id="player-background" class="scene-background"></div>

        <div class="player-status-bar">

                <div id="player-die-display" class="die-indicator">🎲 d8</div>
                <div class="clock-container">
                    <span class="clock-label">Reloj:</span>
                    <div id="player-clock-display" style="display:flex;gap:4px;"></div>
                </div>
                <span id="player-scene-counter"></span>
            </div>
        </div>

        <!-- Main -->
        <div id="player-main"></div>

        <!-- Scene Transition Overlay -->
        <div id="scene-transition-overlay"></div>

        <!-- Confetti -->
        <div id="confetti-container"></div>
    </div>

        });
    </script>
</body>
