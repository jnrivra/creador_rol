<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡A la Carrera! - Vista de Jugadores</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐆</text></svg>">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/dice.css">
    <style>
        /* === Player View - Self-contained styles === */
        :root {
            --gold: #f4a261;
            --gold-light: #e9c46a;
            --radius: 16px;
            --radius-sm: 10px;
            --font: 'Segoe UI', 'Comic Sans MS', 'Trebuchet MS', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { font-size: 20px; }

        body {
            font-family: var(--font);
            background: #0a0a1a;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        button {
            font-family: var(--font);
            cursor: pointer;
            border: none;
            outline: none;
            transition: transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        /* === Scene Backgrounds === */
        .scene-background {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            transition: opacity 0.8s ease;
        }

        .bg-forest-clearing {
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 30%, #4a7c3f 30%, #2d5a27 60%, #1a4a14 100%);
        }
        .bg-forest-clearing::before {
            content: '🌿🌳🌿🌲🌿🌳🌿';
            position: absolute; bottom: 30%; left: 0; right: 0;
            text-align: center; font-size: 4rem; letter-spacing: 1rem;
            opacity: 0.4; animation: sway 4s ease-in-out infinite;
        }
        .bg-forest-clearing::after {
            content: '';
            position: absolute; top: 10%; right: 15%;
            width: 80px; height: 80px;
            background: radial-gradient(circle, #FFD700 30%, #FFA500 60%, transparent 70%);
            border-radius: 50%; animation: glow 3s infinite alternate;
        }

        .bg-river {
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 25%, #4a7c3f 25%, #2d5a27 45%, #2196F3 45%, #1565C0 65%, #2d5a27 65%, #1a4a14 100%);
        }
        .bg-river::before {
            content: '';
            position: absolute; top: 45%; left: 0; right: 0; height: 20%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 25%, transparent 50%, rgba(255,255,255,0.15) 75%, transparent 100%);
            animation: waveFlow 3s linear infinite;
        }

        .bg-tunnel {
            background: radial-gradient(ellipse at center, #1a2a1a 0%, #0d150d 40%, #050a05 100%);
        }

        .bg-den {
            background: radial-gradient(ellipse at center bottom, #8B4513 0%, #654321 40%, #3d2914 70%, #1a1208 100%);
        }
        .bg-den::before {
            content: '🦡';
            position: absolute; bottom: 25%; left: 50%;
            transform: translateX(-50%); font-size: 5rem;
            animation: grumble 2s ease-in-out infinite; opacity: 0.3;
        }

        .bg-treasure {
            background: radial-gradient(ellipse at center, #FFD700 0%, #DAA520 20%, #8B6914 40%, #2d5a27 60%, #1a4a14 100%);
            animation: treasureGlow 2s ease-in-out infinite alternate;
        }
        .bg-treasure::before {
            content: '✨💎✨';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); font-size: 4rem;
            animation: sparkle 1.5s ease-in-out infinite; opacity: 0.3;
        }

        .bg-victory {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
        }
        .bg-victory::before {
            content: '⭐🌟⭐🌟⭐🌟⭐';
            position: absolute; top: 10%; left: 0; right: 0;
            text-align: center; font-size: 2.5rem; letter-spacing: 1rem;
            animation: twinkle 1s ease-in-out infinite alternate; opacity: 0.5;
        }

        @keyframes treasureGlow { to { filter: brightness(1.1); } }
        @keyframes grumble { 0%, 100% { transform: translateX(-50%) rotate(-2deg); } 50% { transform: translateX(-50%) rotate(2deg); } }
        @keyframes sparkle { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.5; } }
        @keyframes waveFlow { to { background-position-x: 200%; } }

        /* === Layout === */
        .player-wrap {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* === Status Bar === */
        .player-status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 1.5rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
            min-height: 50px;
        }

        .player-status-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .die-indicator {
            font-size: 1rem;
            font-weight: 800;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .clock-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        .clock-segment {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        .clock-segment.filled {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(244, 162, 97, 0.5);
        }

        #player-scene-counter {
            font-size: 1rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
        }

        /* === Main Content === */
        #player-main {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 2rem;
            overflow-y: auto;
        }

        .scene-content-player {
            max-width: 950px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* === Scene Illustration === */
        .scene-illustration {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .scene-art {
            font-size: 2rem;
            line-height: 1.4;
            letter-spacing: 0.3rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
        }

        .scene-illustration-forest .scene-art { border-color: rgba(74, 124, 63, 0.4); }
        .scene-illustration-river .scene-art { border-color: rgba(33, 150, 243, 0.4); }
        .scene-illustration-tunnel .scene-art { border-color: rgba(255, 235, 59, 0.2); background: rgba(0,0,0,0.6); }
        .scene-illustration-den .scene-art { border-color: rgba(139, 69, 19, 0.4); }
        .scene-illustration-treasure .scene-art { border-color: rgba(255, 215, 0, 0.4); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        .scene-illustration-victory .scene-art {
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        /* === Scene Title === */
        .player-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        /* === Narrative === */
        .player-narrative {
            font-size: 1.5rem;
            line-height: 1.8;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem 2.5rem;
            border-radius: var(--radius);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            cursor: pointer;
            min-height: 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .player-narrative.typing::after {
            content: '▋';
            animation: blink 0.8s infinite;
        }

        /* === Choices === */
        .player-choices {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            transition: opacity 0.4s ease;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.92);
            color: #264653;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 1.3rem 1.5rem;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            min-height: 80px;
            flex-wrap: wrap;
            cursor: default;
            animation: slideUp 0.4s ease-out;
        }

        .choice-emoji { font-size: 2.5rem; flex-shrink: 0; }
        .choice-text { flex: 1; }

        .choice-badge {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            white-space: nowrap;
        }

        .choice-badge.advantage { background: rgba(244, 162, 97, 0.2); color: #c2410c; }
        .choice-badge.auto-success { background: rgba(34, 197, 94, 0.2); color: #15803d; }
        .choice-badge.roll { background: rgba(99, 102, 241, 0.15); color: #4338ca; }

        /* === Outcome === */
        .player-outcome {
            display: none;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 1.5rem 2rem;
            border: 1px solid rgba(255,255,255,0.08);
            animation: slideUp 0.3s ease-out;
        }

        .outcome-text {
            font-size: 1.4rem;
            line-height: 1.7;
            color: white;
            margin-bottom: 0.5rem;
        }

        .auto-success-banner {
            font-size: 1.6rem;
            font-weight: 800;
            color: #4ade80;
            margin-bottom: 0.8rem;
            animation: popIn 0.3s ease-out;
        }

        .skill-banner { color: #fbbf24; }

        .clock-warning {
            background: rgba(231, 111, 81, 0.3);
            color: #fca5a5;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 700;
            margin-top: 0.8rem;
            animation: shake 0.5s ease-out;
        }

        /* === Dice Area === */
        .dice-area { text-align: center; min-height: 40px; }
        .dice-area.active { padding: 1rem 0; }

        .die {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #fff 0%, #e8e8e8 100%);
            border-radius: 20px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
            position: relative;
            margin: 0 auto;
        }

        .die.rolling { animation: dieRoll 0.8s ease-in-out infinite; }
        .die .die-label { font-size: 0.8rem; color: #666; font-weight: 700; }
        .die .die-value { font-size: 3.5rem; font-weight: 900; color: #333; }
        .die.settled { animation: none; }
        .die.result-critico { background: linear-gradient(135deg, #fef3c7, #fde68a); box-shadow: 0 0 30px rgba(234,179,8,0.5); }
        .die.result-exito { background: linear-gradient(135deg, #dcfce7, #bbf7d0); }
        .die.result-complicacion { background: linear-gradient(135deg, #ffedd5, #fed7aa); }
        .die.result-juerga { background: linear-gradient(135deg, #f3e8ff, #e9d5ff); }

        .dice-result {
            font-size: 2rem;
            font-weight: 800;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            margin-top: 0.8rem;
            display: inline-block;
            animation: popIn 0.3s ease-out;
        }

        .dice-result.result-critico { color: #b45309; }
        .dice-result.result-exito { color: #15803d; }
        .dice-result.result-complicacion { color: #c2410c; }
        .dice-result.result-juerga { color: #7c3aed; }

        .result-emoji { font-size: 2.5rem; }
        .advantage-badge { font-size: 1rem; color: var(--gold); font-weight: 700; margin-top: 0.5rem; }
        .dice-detail { font-size: 0.9rem; color: rgba(255,255,255,0.7); margin-top: 0.4rem; }

        /* === Victory === */
        .victory-content { text-align: center; }

        .victory-title {
            font-size: 3.5rem !important;
            animation: pulse 1.5s ease-in-out infinite !important;
            color: var(--gold-light) !important;
        }

        .victory-team {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 1.5rem 0;
        }

        .victory-character {
            text-align: center;
            animation: bounce 1s ease-in-out infinite;
        }

        .victory-character:nth-child(2) { animation-delay: 0.2s; }

        .victory-emoji { font-size: 6rem; display: block; margin-bottom: 0.3rem; }

        .victory-character span:last-child {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }

        .victory-message {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 1rem 0;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .victory-stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .victory-stats span {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 20px;
        }

        /* === Waiting Screen === */
        .waiting-screen {
            text-align: center;
            color: white;
            padding: 2rem;
        }

        .waiting-emoji {
            font-size: 6rem;
            animation: bounce 2s ease-in-out infinite;
            margin-bottom: 1.5rem;
            display: block;
        }

        .waiting-text {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .waiting-sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 2rem;
        }

        .btn-activate-audio {
            background: linear-gradient(135deg, var(--gold) 0%, #e76f51 100%);
            color: white;
            font-size: 1.3rem;
            font-weight: 800;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(231, 111, 81, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        .btn-activate-audio:hover {
            transform: scale(1.05);
        }

        /* === Confetti === */
        #confetti-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -10px;
            width: 12px;
            height: 12px;
            animation: confettiFall 3s ease-in forwards;
        }

        .confetti-circle { border-radius: 50%; }
        .confetti-strip { width: 5px; height: 16px; border-radius: 2px; }

        /* === Background Extras === */
        .bg-extra { position: absolute; pointer-events: none; z-index: 1; }
        .floating-leaf { animation: leafFall 8s linear infinite; }
        .bg-firefly {
            width: 6px; height: 6px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffeb3b, 0 0 15px #ffeb3b;
            animation: firefly 4s ease-in-out infinite;
        }
        .bg-sparkle { animation: sparkleFloat 2s ease-in-out infinite; }
        .bg-splash { animation: splashUp 3s ease-in-out infinite; }
        .bg-star { animation: starTwinkle 2s ease-in-out infinite; }

        /* === Team Panel (sidebar) === */
        .player-team-panel {
            position: fixed;
            right: 0;
            top: 60px;
            bottom: 0;
            width: 260px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 50;
            padding: 1rem;
            overflow-y: auto;
            animation: slideInRight 0.4s ease-out;
            border-left: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .player-team-header {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .player-team-member {
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 0.7rem;
            margin-bottom: 0.7rem;
            border-left: 4px solid;
            display: flex;
            gap: 0.7rem;
            align-items: flex-start;
        }

        .ptm-avatar {
            font-size: 2.8rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .ptm-info { flex: 1; }

        .ptm-name {
            font-size: 1rem;
            font-weight: 800;
            color: white;
        }

        .ptm-species {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.3rem;
        }

        .ptm-level {
            color: var(--gold);
            font-weight: 700;
        }

        .ptm-tags {
            display: flex;
            flex-direction: column;
            gap: 0.12rem;
        }

        .ptm-tag {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.55);
        }

        /* === Roll Prompt === */
        .roll-prompt {
            text-align: center;
            padding: 1.5rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .roll-prompt-emoji {
            font-size: 5rem;
            animation: bounce 1s ease-in-out infinite;
            display: block;
            margin-bottom: 0.5rem;
        }

        .roll-prompt-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 0.5rem;
        }

        .roll-prompt-detail {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.7);
        }

        .roll-prompt-advantage {
            font-size: 1rem;
            color: #fbbf24;
            font-weight: 700;
            margin-top: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        /* === Waiting for GM === */
        .player-waiting-gm {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.35);
        }

        .waiting-dots::after {
            content: '';
            animation: waitingDots 1.5s infinite;
        }

        @keyframes waitingDots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* === Scene transition === */
        .scene-transitioning {
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* === Scrollbar === */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="player-wrap">
        <!-- Background -->
        <div id="player-background" class="scene-background"></div>

        <!-- Status Bar -->
        <div class="player-status-bar">
            <div class="player-status-left">
                <div id="player-die-display" class="die-indicator">🎲 d8</div>
                <div class="clock-container">
                    <span class="clock-label">Reloj:</span>
                    <div id="player-clock-display" style="display:flex;gap:4px;"></div>
                </div>
                <span id="player-scene-counter"></span>
            </div>
        </div>

        <!-- Main -->
        <div id="player-main"></div>

        <!-- Confetti -->
        <div id="confetti-container"></div>
    </div>

    <script src="js/data/bestiary.js"></script>
    <script src="js/data/scenes.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/dice.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/player-view.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            window.Carrera.playerView.init();
        });
    </script>
</body>
</html>
